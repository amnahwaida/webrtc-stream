<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WebRTC Publisher - Camera Source</title>
<meta name="description" content="WebRTC low-latency camera publisher for LAN streaming">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a2e;--border:#2a2a3e;
  --text:#e4e4ef;--text2:#8888a0;--accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00cec9;--red:#ff6b6b;--orange:#ffa502;
  --radius:12px;--glass:rgba(18,18,26,0.85);
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

.app{display:flex;flex-direction:column;height:100%;position:relative}

/* Header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--glass);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);z-index:10;
}
.header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.header h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0}
.header h1 .dot.live{background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* Video Container */
.video-wrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
#localVideo{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.video-overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px;background:linear-gradient(transparent,rgba(0,0,0,.7));
  display:flex;justify-content:space-between;align-items:flex-end;
  pointer-events:none;
}
.stat-pill{
  font-size:11px;padding:4px 10px;border-radius:20px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  color:var(--text2);display:inline-flex;align-items:center;gap:4px;
  border:1px solid rgba(255,255,255,.1);
}
.stat-pill .val{color:var(--green);font-weight:600}

/* Placeholder */
.placeholder{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  color:var(--text2);text-align:center;padding:20px;
}
.placeholder svg{width:64px;height:64px;opacity:.3}
.placeholder p{font-size:14px;max-width:280px;line-height:1.5}

/* Controls */
.controls{
  padding:16px;background:var(--glass);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
}
.controls-row{display:flex;gap:10px;margin-bottom:10px}
.controls-row:last-child{margin-bottom:0}

.config-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.config-item{display:flex;flex-direction:column;gap:4px}
.config-item label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.config-item select,.config-item input{
  padding:8px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;transition:border-color .2s;
}
.config-item select:focus,.config-item input:focus{border-color:var(--accent)}

.btn{
  flex:1;padding:14px;border:none;border-radius:var(--radius);
  font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s ease;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#ee5a5a}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:10px;font-size:12px}

/* Toast */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
  padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  z-index:100;transition:transform .3s ease;backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.success{border-color:var(--green);color:var(--green)}

/* Connection Status Bar */
.status-bar{
  padding:6px 16px;font-size:11px;text-align:center;
  font-weight:500;letter-spacing:.3px;
}
.status-bar.connecting{background:var(--orange);color:#000}
.status-bar.connected{background:var(--green);color:#000}
.status-bar.disconnected{background:var(--red);color:#fff}
</style>
</head>
<body>
<div class="app">
  <div id="statusBar" class="status-bar disconnected">⚡ Disconnected</div>
  <div class="header">
    <h1><span id="liveDot" class="dot"></span> Publisher</h1>
    <span class="badge" id="roomBadge">Room: cam1</span>
  </div>

  <div class="video-wrap">
    <video id="localVideo" autoplay playsinline muted></video>
    <div id="placeholder" class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/>
      </svg>
      <p>Tap <strong>Start Camera</strong> to begin capturing video from this device</p>
    </div>
    <div class="video-overlay" id="statsOverlay" style="display:none">
      <div>
        <span class="stat-pill">🎥 <span class="val" id="statRes">-</span></span>
        <span class="stat-pill">⚡ <span class="val" id="statFps">-</span> fps</span>
      </div>
      <div>
        <span class="stat-pill">📤 <span class="val" id="statBitrate">-</span> kbps</span>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="config-row">
      <div class="config-item">
        <label>Resolution</label>
        <select id="selRes">
          <option value="1280x720" selected>720p (HD)</option>
          <option value="1920x1080">1080p (FHD)</option>
          <option value="640x480">480p (SD)</option>
        </select>
      </div>
      <div class="config-item">
        <label>Frame Rate</label>
        <select id="selFps">
          <option value="30" selected>30 fps</option>
          <option value="24">24 fps</option>
          <option value="15">15 fps</option>
          <option value="60">60 fps</option>
        </select>
      </div>
    </div>
    <div class="config-row">
      <div class="config-item">
        <label>Camera</label>
        <select id="selCamera"><option>Loading...</option></select>
      </div>
      <div class="config-item">
        <label>Room ID</label>
        <input type="text" id="inputRoom" value="cam1" placeholder="e.g. cam1">
      </div>
    </div>
    <div class="controls-row">
      <button class="btn btn-primary" id="btnStart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Start Camera
      </button>
      <button class="btn btn-danger" id="btnStop" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>
    </div>
    <div class="controls-row">
      <button class="btn btn-secondary btn-sm" id="btnAudio">🔇 Audio Off</button>
      <button class="btn btn-secondary btn-sm" id="btnFlip">🔄 Flip Camera</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  // ── DOM ──
  const $ = id => document.getElementById(id);
  const localVideo = $('localVideo');
  const btnStart = $('btnStart');
  const btnStop = $('btnStop');
  const btnAudio = $('btnAudio');
  const btnFlip = $('btnFlip');
  const selRes = $('selRes');
  const selFps = $('selFps');
  const selCamera = $('selCamera');
  const inputRoom = $('inputRoom');
  const placeholder = $('placeholder');
  const statsOverlay = $('statsOverlay');
  const statusBar = $('statusBar');
  const liveDot = $('liveDot');
  const roomBadge = $('roomBadge');

  // ── State ──
  let localStream = null;
  let ws = null;
  let peerConnections = new Map(); // viewerId -> RTCPeerConnection
  let clientId = 'pub_' + Math.random().toString(36).substr(2, 6);
  let roomId = 'cam1';
  let audioEnabled = false;
  let facingMode = 'environment';
  let statsInterval = null;
  let reconnectTimer = null;
  let reconnectAttempts = 0;
  const MAX_RECONNECT = 10;

  // ── Toast ──
  function toast(msg, type = '') {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Status ──
  function setStatus(status, text) {
    statusBar.className = 'status-bar ' + status;
    statusBar.textContent = text;
    liveDot.className = 'dot' + (status === 'connected' ? ' live' : '');
  }

  // ── Camera Enumeration ──
  async function enumCameras() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      selCamera.innerHTML = '';
      cams.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || `Camera ${i + 1}`;
        selCamera.appendChild(opt);
      });
    } catch (e) {
      console.warn('Could not enumerate cameras:', e);
    }
  }

  // ── Get Media ──
  async function startCamera() {
    const [w, h] = selRes.value.split('x').map(Number);
    const fps = parseInt(selFps.value);
    const constraints = {
      video: {
        width: { ideal: w }, height: { ideal: h },
        frameRate: { ideal: fps },
        facingMode: facingMode
      },
      audio: audioEnabled
    };
    if (selCamera.value) {
      constraints.video.deviceId = { exact: selCamera.value };
      delete constraints.video.facingMode;
    }

    try {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
      }
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
      localVideo.srcObject = localStream;
      placeholder.style.display = 'none';
      statsOverlay.style.display = '';
      await enumCameras();
      btnStart.disabled = true;
      btnStop.disabled = false;
      toast('📹 Camera started', 'success');
      connectSignaling();
    } catch (err) {
      toast('❌ Camera error: ' + err.message, 'error');
      console.error('getUserMedia error:', err);
    }
  }

  function stopCamera() {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    localVideo.srcObject = null;
    placeholder.style.display = '';
    statsOverlay.style.display = 'none';
    btnStart.disabled = false;
    btnStop.disabled = true;

    // Close all peer connections
    for (const [id, pc] of peerConnections) {
      pc.close();
    }
    peerConnections.clear();

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'leave', roomId, clientId }));
      ws.close();
    }
    ws = null;
    clearInterval(statsInterval);
    clearTimeout(reconnectTimer);
    setStatus('disconnected', '⚡ Disconnected');
    toast('⏹ Camera stopped');
  }

  // ── WebSocket Signaling ──
  function connectSignaling() {
    roomId = inputRoom.value.trim() || 'cam1';
    roomBadge.textContent = 'Room: ' + roomId;

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const params = new URLSearchParams(location.search);
    const token = params.get('token') || '';
    const wsUrl = `${proto}//${location.host}/ws${token ? '?token=' + token : ''}`;

    setStatus('connecting', '🔄 Connecting...');

    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      reconnectAttempts = 0;
      setStatus('connected', '✅ Connected to signaling');
      ws.send(JSON.stringify({
        type: 'join', roomId, clientId, role: 'publisher'
      }));
    };

    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);
      handleSignalingMessage(msg);
    };

    ws.onclose = (evt) => {
      setStatus('disconnected', '⚡ Disconnected');
      if (localStream && reconnectAttempts < MAX_RECONNECT) {
        const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts), 10000);
        reconnectAttempts++;
        setStatus('connecting', `🔄 Reconnecting (${reconnectAttempts})...`);
        reconnectTimer = setTimeout(connectSignaling, delay);
      }
    };

    ws.onerror = (err) => {
      console.error('WebSocket error:', err);
    };
  }

  // ── Signaling Message Handler ──
  function handleSignalingMessage(msg) {
    switch (msg.type) {
      case 'joined':
        toast(`✅ Joined room "${msg.roomId}"`, 'success');
        // If viewers already present, send offers
        if (msg.peers) {
          msg.peers.forEach(p => {
            if (p.role === 'viewer') createPeerConnection(p.clientId);
          });
        }
        startStatsMonitor();
        break;

      case 'peer_joined':
        if (msg.role === 'viewer') {
          toast('👁️ Viewer connected');
          createPeerConnection(msg.clientId);
        }
        break;

      case 'peer_left':
        const pc = peerConnections.get(msg.clientId);
        if (pc) { pc.close(); peerConnections.delete(msg.clientId); }
        toast('👁️ Viewer disconnected');
        break;

      case 'answer':
        handleRemoteAnswer(msg);
        break;

      case 'candidate':
        handleRemoteCandidate(msg);
        break;

      case 'error':
        toast(`❌ ${msg.message}`, 'error');
        break;

      case 'server_shutdown':
        toast('⚠️ Server restarting...', 'error');
        break;

      case 'kicked':
        toast('🚫 Kicked by admin', 'error');
        stopCamera();
        break;
    }
  }

  // ── WebRTC Peer Connection ──
  function createPeerConnection(viewerId) {
    const pc = new RTCPeerConnection({
      iceTransportPolicy: 'all',
      iceCandidatePoolSize: 2
    });

    peerConnections.set(viewerId, pc);

    // Add tracks
    if (localStream) {
      localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
      });
    }

    // Prefer H.264 if available
    const transceivers = pc.getTransceivers();
    transceivers.forEach(t => {
      if (t.sender && t.sender.track && t.sender.track.kind === 'video') {
        const codecs = RTCRtpSender.getCapabilities('video')?.codecs || [];
        const h264 = codecs.filter(c => c.mimeType === 'video/H264');
        const others = codecs.filter(c => c.mimeType !== 'video/H264');
        if (h264.length > 0) {
          try { t.setCodecPreferences([...h264, ...others]); } catch(e) {}
        }
      }
    });

    pc.onicecandidate = (e) => {
      if (e.candidate && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'candidate', roomId, candidate: e.candidate,
          senderId: clientId, targetId: viewerId
        }));
      }
    };

    pc.oniceconnectionstatechange = () => {
      const state = pc.iceConnectionState;
      if (state === 'failed' || state === 'disconnected') {
        pc.close();
        peerConnections.delete(viewerId);
      }
    };

    // Create and send offer
    pc.createOffer({ offerToReceiveAudio: false, offerToReceiveVideo: false })
      .then(offer => pc.setLocalDescription(offer))
      .then(() => {
        ws.send(JSON.stringify({
          type: 'offer', roomId, sdp: pc.localDescription.sdp,
          senderId: clientId, targetId: viewerId
        }));
      })
      .catch(err => console.error('Offer error:', err));
  }

  function handleRemoteAnswer(msg) {
    const pc = peerConnections.get(msg.senderId);
    if (pc && pc.signalingState === 'have-local-offer') {
      pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: msg.sdp }))
        .catch(err => console.error('setRemoteDescription error:', err));
    }
  }

  function handleRemoteCandidate(msg) {
    const pc = peerConnections.get(msg.senderId);
    if (pc) {
      pc.addIceCandidate(new RTCIceCandidate(msg.candidate))
        .catch(err => console.error('addIceCandidate error:', err));
    }
  }

  // ── Stats Monitor ──
  function startStatsMonitor() {
    clearInterval(statsInterval);
    let prevBytesSent = 0;
    let prevTimestamp = 0;
    statsInterval = setInterval(async () => {
      for (const [, pc] of peerConnections) {
        try {
          const stats = await pc.getStats();
          stats.forEach(report => {
            if (report.type === 'outbound-rtp' && report.kind === 'video') {
              const track = localStream?.getVideoTracks()[0];
              if (track) {
                const settings = track.getSettings();
                $('statRes').textContent = `${settings.width||'-'}×${settings.height||'-'}`;
                $('statFps').textContent = settings.frameRate ? Math.round(settings.frameRate) : '-';
              }
              if (prevTimestamp > 0) {
                const dt = (report.timestamp - prevTimestamp) / 1000;
                const dBytes = report.bytesSent - prevBytesSent;
                const kbps = Math.round((dBytes * 8) / dt / 1000);
                $('statBitrate').textContent = kbps;
              }
              prevBytesSent = report.bytesSent;
              prevTimestamp = report.timestamp;
            }
          });
        } catch(e) {}
        break; // stats from first peer is enough
      }
    }, 2000);
  }

  // ── Button Handlers ──
  btnStart.addEventListener('click', startCamera);
  btnStop.addEventListener('click', stopCamera);

  btnAudio.addEventListener('click', () => {
    audioEnabled = !audioEnabled;
    btnAudio.textContent = audioEnabled ? '🔊 Audio On' : '🔇 Audio Off';
    btnAudio.classList.toggle('active', audioEnabled);
    if (localStream) {
      const audioTracks = localStream.getAudioTracks();
      audioTracks.forEach(t => t.enabled = audioEnabled);
    }
  });

  btnFlip.addEventListener('click', async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    localVideo.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';
    if (localStream) {
      // Restart camera with new facing
      localStream.getTracks().forEach(t => t.stop());
      const [w, h] = selRes.value.split('x').map(Number);
      const fps = parseInt(selFps.value);
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { width:{ideal:w}, height:{ideal:h}, frameRate:{ideal:fps}, facingMode },
          audio: audioEnabled
        });
        localVideo.srcObject = localStream;
        // Replace tracks in peer connections
        const videoTrack = localStream.getVideoTracks()[0];
        for (const [, pc] of peerConnections) {
          const sender = pc.getSenders().find(s => s.track?.kind === 'video');
          if (sender && videoTrack) sender.replaceTrack(videoTrack);
        }
      } catch(e) { toast('❌ Flip failed: ' + e.message, 'error'); }
    }
  });

  // Init
  enumCameras();
  navigator.mediaDevices?.addEventListener('devicechange', enumCameras);
})();
</script>
</body>
</html>
