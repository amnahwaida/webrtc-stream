<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WebRTC Publisher - Camera Source</title>
<meta name="description" content="WebRTC low-latency camera publisher for LAN streaming">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a2e;--border:#2a2a3e;
  --text:#e4e4ef;--text2:#8888a0;--accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00cec9;--red:#ff6b6b;--orange:#ffa502;
  --radius:12px;--glass:rgba(18,18,26,0.85);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;position:relative}

/* Status Bar */
.status-bar{
  padding:4px 16px;font-size:11px;text-align:center;
  font-weight:500;letter-spacing:.3px;flex-shrink:0;
}
.status-bar.connecting{background:var(--orange);color:#000}
.status-bar.connected{background:var(--green);color:#000}
.status-bar.disconnected{background:var(--red);color:#fff}

/* Video - takes all remaining space */
.video-wrap{flex:1;position:relative;background:#000;overflow:hidden;min-height:0}
#localVideo{width:100%;height:100%;object-fit:contain;background:#000}

/* Floating badges on video */
.video-overlay{
  position:absolute;top:12px;left:12px;right:12px;
  display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;z-index:5;
}
.stat-pill{
  font-size:11px;padding:4px 10px;border-radius:20px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  color:var(--text2);display:inline-flex;align-items:center;gap:4px;
  border:1px solid rgba(255,255,255,.1);
}
.stat-pill .val{color:var(--green);font-weight:600}
.room-badge{
  font-size:11px;padding:4px 10px;border-radius:20px;
  background:rgba(108,92,231,.4);backdrop-filter:blur(8px);
  color:#fff;border:1px solid rgba(162,155,254,.3);font-weight:600;
}

/* Placeholder */
.placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  color:var(--text2);text-align:center;padding:20px;
}
.placeholder.hidden{display:none}
.placeholder svg{width:64px;height:64px;opacity:.3}
.placeholder p{font-size:14px;max-width:280px;line-height:1.5}

/* Floating toggle button (always visible) */
.fab-toggle{
  position:absolute;bottom:16px;right:16px;z-index:15;
  width:48px;height:48px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;font-size:22px;
  cursor:pointer;box-shadow:0 4px 20px rgba(108,92,231,.5);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.fab-toggle:active{transform:scale(.9)}
.fab-toggle.open{background:var(--red)}

/* Floating action buttons (quick controls when panel hidden) */
.fab-actions{
  position:absolute;bottom:16px;left:16px;z-index:15;
  display:flex;gap:8px;
}
.fab-actions.hidden{display:none}
.fab-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,255,255,.15);transition:all .2s;
}
.fab-btn:active{transform:scale(.9)}
.fab-btn.active{background:var(--accent);border-color:var(--accent)}
.fab-btn.recording{background:var(--red);border-color:var(--red)}

/* Controls Panel (slides from bottom) */
.controls{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  background:var(--glass);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding:16px;
  transform:translateY(0);transition:transform .3s ease;
  max-height:70vh;overflow-y:auto;
  pointer-events:auto;
}
.controls.hidden{transform:translateY(100%);pointer-events:none}

.config-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.config-row.triple{grid-template-columns:1fr 1fr 1fr}
.config-item{display:flex;flex-direction:column;gap:4px}
.config-item label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.config-item select,.config-item input{
  padding:8px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;
}
.controls-row{display:flex;gap:10px;margin-bottom:10px}
.controls-row:last-child{margin-bottom:0}
.btn{
  flex:1;padding:12px;border:none;border-radius:var(--radius);
  font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s ease;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-accent{background:#00d2ff;background:linear-gradient(to right, #3a7bd5, #00d2ff);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:10px;font-size:12px}

/* Toast */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
  padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  z-index:100;transition:transform .3s ease;backdrop-filter:blur(20px);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.success{border-color:var(--green);color:var(--green)}

/* Landscape adjustments */
@media (orientation: landscape) and (max-height: 500px) {
  .controls{max-height:80vh;padding:10px 16px}
  .config-row{margin-bottom:8px;gap:6px}
  .config-item select,.config-item input{padding:6px 8px;font-size:12px}
  .config-item label{font-size:9px}
  .btn{padding:8px;font-size:12px}
  .btn-sm{padding:6px;font-size:11px}
  .status-bar{padding:2px 16px;font-size:10px}
}
</style>
</head>
<body>
<div class="app">
  <div id="statusBar" class="status-bar disconnected">⚡ Disconnected</div>

  <div class="video-wrap">
    <video id="localVideo" autoplay playsinline muted></video>
    <div id="placeholder" class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/>
      </svg>
      <p>Tap <strong>⚙️</strong> to open settings, then <strong>Start Camera</strong></p>
    </div>

    <!-- Floating info on video -->
    <div class="video-overlay" id="statsOverlay" style="display:none">
      <div>
        <span class="stat-pill">🎥 <span class="val" id="statRes">-</span></span>
        <span class="stat-pill">⚡ <span class="val" id="statFps">-</span> fps</span>
        <span class="stat-pill">📤 <span class="val" id="statBitrate">-</span> kbps</span>
      </div>
      <span class="room-badge" id="roomBadge">cam1</span>
    </div>

    <!-- Quick action buttons (visible when panel is hidden) -->
    <div class="fab-actions" id="fabActions">
      <button class="fab-btn recording" id="fabStop" title="Stop" style="display:none">⏹</button>
      <button class="fab-btn" id="fabFlip" title="Flip Camera" style="display:none">🔄</button>
      <button class="fab-btn" id="fabAudio" title="Toggle Audio" style="display:none">🔇</button>
    </div>

    <!-- Toggle button for controls panel -->
    <button class="fab-toggle" id="fabToggle" title="Toggle Controls">⚙️</button>
  </div>

  <!-- Slide-up Controls Panel -->
  <div class="controls hidden" id="controlsPanel">
    <div class="config-row triple">
      <div class="config-item">
        <label>Resolution</label>
        <select id="selRes">
          <option value="1280x720" selected>720p</option>
          <option value="1920x1080">1080p</option>
          <option value="640x480">480p</option>
        </select>
      </div>
      <div class="config-item">
        <label>FPS</label>
        <select id="selFps">
          <option value="30" selected>30</option>
          <option value="24">24</option>
          <option value="15">15</option>
          <option value="60">60</option>
        </select>
      </div>
      <div class="config-item">
        <label>Orientation</label>
        <select id="selOrientation">
          <option value="landscape" selected>📺 Land</option>
          <option value="portrait">📱 Port</option>
        </select>
      </div>
    </div>
    <div class="config-row">
      <div class="config-item">
        <label>Camera</label>
        <select id="selCamera"><option>Loading...</option></select>
      </div>
      <div class="config-item">
        <label>Room ID</label>
        <input type="text" id="inputRoom" value="cam1" placeholder="cam1">
      </div>
    </div>
    <div class="controls-row">
            <button id="btnStart" class="btn btn-primary" title="Mulai Streaming Kamera">📹 Start Cam</button>
            <button id="btnScreen" class="btn btn-accent" title="Berbagi Layar / Jendela Spesifik">🖥️ Share Screen</button>
            <button id="btnStop" class="btn btn-danger" disabled title="Berhenti">⏹ Stop</button>
    </div>
    <div class="controls-row">
      <button class="btn btn-secondary btn-sm" id="btnAudio">🔇 Audio Off</button>
      <button class="btn btn-secondary btn-sm" id="btnFlip">🔄 Flip</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const localVideo = $('localVideo');
  const btnStart = $('btnStart'), btnScreen = $('btnScreen'), btnStop = $('btnStop');
  const btnAudio = $('btnAudio'), btnFlip = $('btnFlip');
  const placeholder = $('placeholder'), statsOverlay = $('statsOverlay');
  const selRes = $('selRes'), selFps = $('selFps'), selCamera = $('selCamera');
  const inputRoom = $('inputRoom'), statusBar = $('statusBar');
  const controlsPanel = $('controlsPanel'), fabToggle = $('fabToggle');

  let localStream = null;
  let ws = null;
  let peerConnections = new Map();
  let clientId = 'pub_' + Math.random().toString(36).substr(2, 6);
  let roomId = 'cam1';
  let audioEnabled = false;
  let facingMode = 'environment';
  let statsInterval = null;
  let reconnectTimer = null;
  let reconnectAttempts = 0;
  const MAX_RECONNECT = 10;

  // ICE/STUN/TURN configuration - local coturn server (fully offline LAN)
  const stunHost = location.hostname;
  const rtcConfig = {
    iceServers: [
      { urls: `stun:${stunHost}:3478` }
      // TURN dihapus: semua perangkat di 1 WiFi LAN yang sama
    ],
    iceTransportPolicy: 'all',
    bundlePolicy: 'max-bundle',
    rtcpMuxPolicy: 'require',
    iceCandidatePoolSize: 4 // Ditambah dari 2 ke 4 untuk gathering lebih cepat
  };
  let panelOpen = false;

  function toast(msg, type = '') {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
  }

  function setStatus(status, text) {
    statusBar.className = 'status-bar ' + status;
    statusBar.textContent = text;
  }

  // ── Panel Toggle ──
  function togglePanel(forceState) {
    panelOpen = forceState !== undefined ? forceState : !panelOpen;
    controlsPanel.classList.toggle('hidden', !panelOpen);
    fabToggle.textContent = panelOpen ? '✕' : '⚙️';
    fabToggle.classList.toggle('open', panelOpen);
  }

  fabToggle.addEventListener('click', () => togglePanel());

  // Show fab actions when streaming
  function updateFabActions() {
    const streaming = !!localStream;
    $('fabStop').style.display = streaming ? '' : 'none';
    $('fabFlip').style.display = streaming ? '' : 'none';
    $('fabAudio').style.display = streaming ? '' : 'none';
  }

  // ── Camera Enumeration ──
  async function enumCameras() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      selCamera.innerHTML = '';
      cams.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || `Camera ${i + 1}`;
        selCamera.appendChild(opt);
      });
    } catch (e) {}
  }

  // ── Get Media ──
  async function startScreenShare() {
    try {
      // Minta izin share screen
      // Minta izin share screen (Video + Audio Sistem jika didukung OS/Browser)
      const screenStream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: "always" },
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });
      
      const screenTrack = screenStream.getVideoTracks()[0];
      const screenAudioTrack = screenStream.getAudioTracks()[0]; // Audio dari Jendela/Tab
      
      // Jika sudah streaming, ganti track secara seamless
      if (localStream) {
        const oldVideoTrack = localStream.getVideoTracks()[0];
        // Ambil track audio mikrofon yang lama (Voice)
        const micAudioTrack = localStream.getAudioTracks().find(t => t.id !== (screenAudioTrack?.id));
        
        // Gabungkan video screen dengan audio (Prioritaskan Sistem Audio jika ada, fallback ke Mic)
        // Note: Browser biasanya hanya mengizinkan 1 audio track per stream di WebRTC standard, 
        // tapi kita bisa mencoba mengirim yang paling relevan.
        const audioToUse = screenAudioTrack || micAudioTrack;
        
        localStream = audioToUse ? new MediaStream([screenTrack, audioToUse]) : new MediaStream([screenTrack]);
        localVideo.srcObject = localStream;

        // Update semua koneksi peer
        for (const [viewerId, pc] of peerConnections) {
          // Ganti Video Track
          const videoSender = pc.getSenders().find(s => s.track?.kind === 'video');
          if (videoSender) videoSender.replaceTrack(screenTrack);
          
          // Ganti Audio Track ke System Audio (jika ada) agar suara jendela masuk
          const audioSender = pc.getSenders().find(s => s.track?.kind === 'audio');
          if (audioSender && audioToUse) audioSender.replaceTrack(audioToUse);
            
          // Picu re-negotiation setelah delay singkat agar format video baru dikenali OBS
          setTimeout(() => {
            if (!pc || pc.signalingState === 'closed') return;
            pc.createOffer({ iceRestart: false })
              .then(offer => {
                offer.sdp = optimizeSdp(offer.sdp);
                return pc.setLocalDescription(offer);
              })
              .then(() => {
                if (ws?.readyState === WebSocket.OPEN)
                  ws.send(JSON.stringify({ type: 'offer', roomId, sdp: pc.localDescription.sdp, senderId: clientId, targetId: viewerId }));
              }).catch(e => console.error('Renegotiation failed', e));
          }, 3000);
        }
      } else {
        // Jika belum start, jalankan inisialisasi minimal
        localStream = screenStream;
        localVideo.srcObject = localStream;
        placeholder.classList.add('hidden');
        statsOverlay.style.display = '';
        btnStart.disabled = true;
        btnScreen.disabled = true;
        btnStop.disabled = false;
        roomId = inputRoom.value.trim() || 'cam1';
        $('roomBadge').textContent = roomId;
        connectSignaling();
      }

      // Deteksi jika user menekan tombol "Stop Sharing" bawaan browser
      screenTrack.onended = () => {
        toast('🖥️ Screen sharing ended');
        stopCamera();
      };

      toast('🖥️ Screen sharing started', 'success');
    } catch (err) {
      toast('❌ Screen share error: ' + err.message, 'error');
    }
  }

  async function startCamera() {
    const [baseW, baseH] = selRes.value.split('x').map(Number);
    const fps = parseInt(selFps.value);
    const orientation = $('selOrientation').value;
    const w = orientation === 'portrait' ? Math.min(baseW, baseH) : Math.max(baseW, baseH);
    const h = orientation === 'portrait' ? Math.max(baseW, baseH) : Math.min(baseW, baseH);
    const constraints = {
      video: {
        width: { ideal: w }, height: { ideal: h },
        frameRate: { ideal: fps },
        facingMode: facingMode,
        // Optimasi video driver
        googVideoBadFramesPacketsWindow: 0,
        googLeakyBucket: false,
        googCpuOveruseDetection: false // Jangan throttle meskipun HP panas
      },
      // SELALU tangkap audio, tapi mulai dalam keadaan mati
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: 1,
        sampleRate: 48000,
        sampleSize: 16,
        latency: 0
      }
    };
    if (selCamera.value && selCamera.value !== 'Loading...') {
      constraints.video.deviceId = { exact: selCamera.value };
      delete constraints.video.facingMode;
    }

    try {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
      // Optimasi latensi: beritahu browser bahwa ini real-time
      localStream.getVideoTracks().forEach(t => {
        t.contentHint = 'motion';
      });
      // Audio selalu ada tapi mulai dalam keadaan mati
      localStream.getAudioTracks().forEach(t => {
        t.contentHint = 'speech';
        t.enabled = audioEnabled;  // Matikan audio sampai user nyalakan
      });
      localVideo.srcObject = localStream;
      // Optimasi: minta browser render preview tanpa buffering
      try { localVideo.latencyHint = 0; } catch(e) {}
      placeholder.classList.add('hidden');
      statsOverlay.style.display = '';
      await enumCameras();
      btnStart.disabled = true;
      btnStop.disabled = false;
      roomId = inputRoom.value.trim() || 'cam1';
      $('roomBadge').textContent = roomId;
      updateFabActions();
      togglePanel(false); // Auto-hide panel after starting
      toast('📹 Camera started', 'success');
      connectSignaling();
    } catch (err) {
      toast('❌ Camera error: ' + err.message, 'error');
    }
  }

  function stopCamera() {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    localVideo.srcObject = null;
    placeholder.classList.remove('hidden');
    statsOverlay.style.display = 'none';
    btnStart.disabled = false;
    btnScreen.disabled = false;
    btnStop.disabled = true;
    for (const [, pc] of peerConnections) pc.close();
    peerConnections.clear();
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'leave', roomId, clientId }));
      ws.close();
    }
    ws = null;
    clearInterval(statsInterval);
    clearInterval(window._heartbeatInterval);
    clearTimeout(reconnectTimer);
    setStatus('disconnected', '⚡ Disconnected');
    updateFabActions();
    toast('⏹ Camera stopped');
  }

  // ── WebSocket Signaling ──
  function connectSignaling() {
    roomId = inputRoom.value.trim() || 'cam1';
    $('roomBadge').textContent = roomId;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const params = new URLSearchParams(location.search);
    const token = params.get('token') || '';
    const wsUrl = `${proto}//${location.host}/ws${token ? '?token=' + token : ''}`;
    setStatus('connecting', '🔄 Connecting...');
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      reconnectAttempts = 0;
      setStatus('connected', '✅ Connected');
      ws.send(JSON.stringify({ type: 'join', roomId, clientId, role: 'publisher' }));
    };
    ws.onmessage = (evt) => {
      try { handleSignalingMessage(JSON.parse(evt.data)); } catch(e) {}
    };
    ws.onclose = () => {
      setStatus('disconnected', '⚡ Disconnected');
      clearInterval(window._heartbeatInterval);
      if (localStream && reconnectAttempts < MAX_RECONNECT) {
        const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts), 10000);
        reconnectAttempts++;
        setStatus('connecting', `🔄 Reconnecting (${reconnectAttempts})...`);
        reconnectTimer = setTimeout(connectSignaling, delay);
      }
    };

    // Fix: Bersihkan heartbeat lama sebelum buat baru (cegah memory leak saat reconnect)
    if (window._heartbeatInterval) clearInterval(window._heartbeatInterval);
    window._heartbeatInterval = setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'ping' }));
      } else {
        clearInterval(window._heartbeatInterval);
      }
    }, 55000); // Sinkron dengan server keepalive (60s)
    ws.onerror = () => {};
  }

  function handleSignalingMessage(msg) {
    switch (msg.type) {
      case 'joined':
        toast(`✅ Joined room "${msg.roomId}"`, 'success');
        if (msg.peers) msg.peers.forEach(p => {
          if (p.role === 'viewer') createPeerConnection(p.clientId);
        });
        startStatsMonitor();
        break;
      case 'peer_joined':
        if (msg.role === 'viewer') { toast('👁️ Viewer connected'); createPeerConnection(msg.clientId); }
        break;
      case 'peer_left':
        const pc2 = peerConnections.get(msg.clientId);
        if (pc2) { pc2.close(); peerConnections.delete(msg.clientId); }
        toast('👁️ Viewer disconnected');
        break;
      case 'answer': handleRemoteAnswer(msg); break;
      case 'candidate': handleRemoteCandidate(msg); break;
      case 'control':
        if (msg.command === 'toggle_audio') {
          toast('🎙️ Remote mic toggle requested');
          doAudioToggle();
        } else if (msg.command === 'flip_camera') {
          toast('🔄 Remote camera flip requested');
          doFlip();
        }
        break;
      case 'request_audio_status':
        if (ws && ws.readyState === WebSocket.OPEN) {
          // Cek kondisi ASLI dari track mikrofon
          let actualEnabled = audioEnabled;
          if (localStream && localStream.getAudioTracks().length > 0) {
            actualEnabled = localStream.getAudioTracks()[0].enabled;
          }
          
          ws.send(JSON.stringify({
            type: 'audio_status',
            roomId,
            enabled: actualEnabled,
            targetId: msg.senderId
          }));
        }
        break;
      case 'error': toast(`❌ ${msg.message}`, 'error'); break;
      case 'server_shutdown': toast('⚠️ Server restarting...', 'error'); break;
      case 'kicked': toast('🚫 Kicked by admin', 'error'); stopCamera(); break;
    }
  }

  // ── WebRTC ──
  // SDP optimization - hanya optimasi Opus yang aman, tidak memanipulasi video SDP
  // PENTING: Regex video SDP (fmtp:96, pruning VP8/VP9) telah dihapus karena
  // menyebabkan korupsi SDP di OBS Browser Source (CEF). Payload type tidak selalu 96,
  // dan OBS CEF sering gagal decode H264 hardware. Biarkan browser negosiasi codec sendiri.
  function optimizeSdp(sdp) {
    // 1. Audio optimization: Opus VBR 48kbps Mono
    sdp = sdp.replace(
      /(a=fmtp:\d+ [^\r\n]*useinbandfec=1)/g,
      '$1;usedtx=1;stereo=0;sprop-stereo=0;cbr=0;maxaveragebitrate=48000;maxplaybackrate=48000;ptime=10'
    );
    
    // 2. Bitrate Kickstart & Low Latency Hints
    sdp = sdp.replace(/a=fmtp:(\d+) (.*)/g, (match, pt, fmtp) => {
      if (fmtp.indexOf('max-fs') !== -1 || fmtp.indexOf('apt') !== -1) return match;
      return `a=fmtp:${pt} ${fmtp};x-google-start-bitrate=2500;x-google-min-bitrate=2000;x-google-max-bitrate=5000;x-google-priority=1;goog-complexity=0`;
    });

    // 3. Menghapus rtcp-fb: goog-remb dan transport-cc yang kadang menambah overhead di LAN
    // sdp = sdp.replace(/a=rtcp-fb:(\d+) goog-remb\r\n/g, ''); 
    
    return sdp;
  }

  function createPeerConnection(viewerId) {
    const pc = new RTCPeerConnection(rtcConfig);
    peerConnections.set(viewerId, pc);
    
    // BREAK AUDIO-VIDEO SYNC: Kirim audio dan video sebagai stream terpisah
    // Ini mencegah browser viewer menunda video demi menunggu audio (atau sebaliknya)
    if (localStream) {
      localStream.getVideoTracks().forEach(track => pc.addTrack(track, new MediaStream([track])));
      localStream.getAudioTracks().forEach(track => pc.addTrack(track, new MediaStream([track])));
    }

    // Prefer VP8 terlebih dahulu karena OBS CEF sering gagal hardware-decode H264 dari HP.
    // VP8 = software codec universal yang pasti didukung semua browser termasuk OBS CEF.
    // H264 tetap ada sebagai fallback untuk viewer non-OBS.
    const transceivers = pc.getTransceivers();
    transceivers.forEach(t => {
      if (t.sender?.track?.kind === 'video') {
        const codecs = RTCRtpSender.getCapabilities('video')?.codecs || [];
        const vp8 = codecs.filter(c => c.mimeType === 'video/VP8');
        const h264 = codecs.filter(c => c.mimeType === 'video/H264');
        const others = codecs.filter(c => c.mimeType !== 'video/VP8' && c.mimeType !== 'video/H264');
        const preferred = [...vp8, ...h264, ...others];
        if (preferred.length) try { t.setCodecPreferences(preferred); } catch(e) {}
      }
      // Opus sudah default di semua browser modern — tidak perlu filter
    });

    // ── Optimasi Latensi: Encoding Parameters ──
    pc.getSenders().forEach(sender => {
      if (sender.track?.kind === 'video') {
        const params = sender.getParameters();
        if (!params.encodings) params.encodings = [{}];
        params.encodings.forEach(enc => {
          enc.maxBitrate = 2500000;
          enc.maxFramerate = parseInt(selFps.value) || 30; // Sinkron dengan pilihan user
          enc.networkPriority = 'high';
          enc.priority = 'high';
          // Optimasi: Paksa mode L1T1 (lapisan tunggal) untuk encoding tercepat
          try { enc.scalabilityMode = 'L1T1'; } catch(e) {}
        });
        params.degradationPreference = 'maintain-framerate';
        // DSCP Priority Tagging
        if (params.encodings[0]) params.encodings[0].networkPriority = 'high';
        sender.setParameters(params).catch(() => {});
      }
      // Optimasi Audio Encoding
      if (sender.track?.kind === 'audio') {
        const params = sender.getParameters();
        if (!params.encodings) params.encodings = [{}];
        params.encodings.forEach(enc => {
          enc.maxBitrate = 48000;        // 48kbps Opus Mono (optimal untuk speech)
          enc.networkPriority = 'high';
          enc.priority = 'high';
        });
        sender.setParameters(params).catch(() => {});
      }
    });

    pc.onicecandidate = (e) => {
      if (!e.candidate || ws?.readyState !== WebSocket.OPEN) return;
      // HARDCORE OPTIMIZATION: Hanya gunakan UDP di LAN untuk menghindari delay re-transmission TCP
      const c = e.candidate;
      if (c.protocol !== 'udp') return; 
      if (c.type === 'relay') return; 
      ws.send(JSON.stringify({ type: 'candidate', roomId, candidate: c, senderId: clientId, targetId: viewerId }));
    };

    let disconnectTimer = null;
    pc.oniceconnectionstatechange = () => {
      const s = pc.iceConnectionState;
      console.log(`[ICE] ${viewerId}: ${s}`);
      clearTimeout(disconnectTimer);
      if (s === 'connected' || s === 'completed') {
        // Connection is healthy
      } else if (s === 'disconnected') {
        disconnectTimer = setTimeout(() => {
          if (pc.iceConnectionState === 'disconnected') {
            console.log(`[ICE] ${viewerId}: still disconnected after grace period, attempting ICE restart`);
            pc.createOffer({ iceRestart: true })
              .then(offer => pc.setLocalDescription(offer))
              .then(() => {
                if (ws?.readyState === WebSocket.OPEN)
                  ws.send(JSON.stringify({ type: 'offer', roomId, sdp: pc.localDescription.sdp, senderId: clientId, targetId: viewerId }));
              })
              .catch(() => { pc.close(); peerConnections.delete(viewerId); });
          }
        }, 5000);
      } else if (s === 'failed') {
        console.log(`[ICE] ${viewerId}: failed, closing`);
        pc.close();
        peerConnections.delete(viewerId);
      }
    };

    pc.createOffer({ 
      offerToReceiveAudio: false, 
      offerToReceiveVideo: false,
      voiceActivityDetection: false // Matikan VAD untuk hemat processing
    })
      .then(offer => {
        // Optimasi SDP sebelum kirim
        offer.sdp = optimizeSdp(offer.sdp);
        return pc.setLocalDescription(offer);
      })
      .then(() => ws.send(JSON.stringify({ type: 'offer', roomId, sdp: pc.localDescription.sdp, senderId: clientId, targetId: viewerId })))
      .catch(err => console.error('Offer error:', err));
  }

  function handleRemoteAnswer(msg) {
    const pc = peerConnections.get(msg.senderId);
    if (pc?.signalingState === 'have-local-offer')
      pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: msg.sdp })).catch(() => {});
  }

  function handleRemoteCandidate(msg) {
    const pc = peerConnections.get(msg.senderId);
    if (pc) pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(() => {});
  }

  // ── Stats ──
  function startStatsMonitor() {
    clearInterval(statsInterval);
    let prevBytesSent = 0, prevTimestamp = 0;
    statsInterval = setInterval(async () => {
      for (const [, pc] of peerConnections) {
        try {
          const stats = await pc.getStats();
          stats.forEach(report => {
            if (report.type === 'outbound-rtp' && report.kind === 'video') {
              const track = localStream?.getVideoTracks()[0];
              if (track) {
                const s = track.getSettings();
                $('statRes').textContent = `${s.width||'-'}×${s.height||'-'}`;
                $('statFps').textContent = s.frameRate ? Math.round(s.frameRate) : '-';
              }
              if (prevTimestamp > 0) {
                const dt = (report.timestamp - prevTimestamp) / 1000;
                $('statBitrate').textContent = Math.round(((report.bytesSent - prevBytesSent) * 8) / dt / 1000);
              }
              prevBytesSent = report.bytesSent;
              prevTimestamp = report.timestamp;
            }
          });
        } catch(e) {}
        break;
      }
    }, 5000); // 5 detik cukup untuk monitoring, hemat CPU
  }

  // ── Button Handlers ──
  btnStart.addEventListener('click', startCamera);
  btnScreen.addEventListener('click', startScreenShare);
  btnStop.addEventListener('click', stopCamera);
  $('fabStop').addEventListener('click', stopCamera);

  function doFlip() {
    // Simpan track audio yang sedang berjalan jika ada
    const audioTrack = localStream ? localStream.getAudioTracks()[0] : null;
    
    // Matikan HANYA track video lama
    if (localStream) {
      localStream.getVideoTracks().forEach(t => t.stop());
    }
    
    // Toggle facingMode untuk mendukung HP dengan 1 kamera di dropdown
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    
    // Cycle camera source (jika ada multiple kamera)
    if (selCamera.options.length > 1) {
      selCamera.selectedIndex = (selCamera.selectedIndex + 1) % selCamera.options.length;
    }

    const [baseW, baseH] = selRes.value.split('x').map(Number);
    const fps = parseInt(selFps.value);
    const orientation = $('selOrientation').value;
    const w = orientation === 'portrait' ? Math.min(baseW, baseH) : Math.max(baseW, baseH);
    const h = orientation === 'portrait' ? Math.max(baseW, baseH) : Math.min(baseW, baseH);
    
    // Minta track video baru saja
    const constraints = {
      video: { 
        width:{ideal:w}, height:{ideal:h}, frameRate:{ideal:fps},
        facingMode: facingMode
      },
      audio: false // Jangan minta audio baru, kita akan pakai yang lama
    };
    // Override dengan deviceId jika ada multiple kamera
    if (selCamera.options.length > 1 && selCamera.value) {
      constraints.video.deviceId = { exact: selCamera.value };
      delete constraints.video.facingMode;
    }

    navigator.mediaDevices.getUserMedia(constraints).then(newStream => {
      const newVideoTrack = newStream.getVideoTracks()[0];
      
      // Jika ada audio lama, gabungkan dengan video baru ke localStream
      if (audioTrack) {
        localStream = new MediaStream([newVideoTrack, audioTrack]);
      } else {
        localStream = newStream;
      }

      localVideo.srcObject = localStream;

      // Update semua koneksi peer dengan track video baru tanpa memutus audio
      for (const [, pc] of peerConnections) {
        const sender = pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender && newVideoTrack) {
          sender.replaceTrack(newVideoTrack);
        }
      }
    }).catch(e => toast('❌ Flip failed: ' + e.message, 'error'));
  }

  // Audio toggle sekarang sangat sederhana: hanya enable/disable track
  async function doAudioToggle() {
    audioEnabled = !audioEnabled;
    btnAudio.textContent = audioEnabled ? '🔊 Audio On' : '🔇 Audio Off';
    btnAudio.classList.toggle('active', audioEnabled);
    $('fabAudio').textContent = audioEnabled ? '🔊' : '🔇';
    $('fabAudio').classList.toggle('active', audioEnabled);
    
    if (localStream) {
      localStream.getAudioTracks().forEach(t => {
        t.enabled = audioEnabled;
      });
      toast(audioEnabled ? '🎙️ Mikrofon aktif' : '🔇 Mikrofon mati');
    }

    // Broadcast status ke semua viewer
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type: 'audio_status',
        roomId,
        enabled: audioEnabled,
        senderId: clientId
      }));
    }
  }

  btnFlip.addEventListener('click', doFlip);
  $('fabFlip').addEventListener('click', doFlip);
  btnAudio.addEventListener('click', doAudioToggle);
  $('fabAudio').addEventListener('click', doAudioToggle);

  // Init
  enumCameras();
  navigator.mediaDevices?.addEventListener('devicechange', enumCameras);

  // Auto-open panel on first load
  togglePanel(true);
})();
</script>
