<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Stream v7</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  video { width: 100vw; height: 100vh; object-fit: contain; background: #000; cursor: pointer; }
</style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<!-- Overlay unmute untuk Browser Biasa -->
<div id="unmuteOverlay" style="position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);cursor:pointer;color:white;font-family:sans-serif;text-align:center">
  <div style="background:var(--accent,#6c5ce7);padding:20px 40px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.5)">
    <div style="font-size:40px;margin-bottom:10px">🔊</div>
    <div style="font-size:18px;font-weight:bold">Klik untuk Aktifkan Suara</div>
    <div style="font-size:12px;opacity:0.8;margin-top:5px">Browser memblokir suara otomatis</div>
  </div>
</div>
<!-- Version indicator -->
<div style="position:fixed;bottom:4px;right:4px;font-size:9px;color:rgba(255,255,255,0.3);z-index:5">v9-stable</div>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  const roomId = params.get('room') || 'cam1';
  const clientId = 'obs_' + Math.random().toString(36).substr(2, 8);
  const vid = document.getElementById('video');

  const stunHost = location.hostname;
  const rtcConfig = {
    iceServers: [
      { urls: `stun:${stunHost}:3478` }
      // TURN dihapus: semua perangkat di 1 WiFi LAN yang sama
    ]
  };

  let ws, pc, publisherId;
  let pendingCandidates = [];

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${proto}//${location.host}/ws`;

    if (ws) { try { ws.close(); } catch(e) {} }
    if (pc) { try { pc.close(); } catch(e) {} pc = null; }

    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'join', roomId, clientId, role: 'viewer' }));
    };

    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'offer') {
        publisherId = msg.senderId;
        handleOffer(msg);
      } else if (msg.type === 'candidate') {
        if (pc && pc.remoteDescription) {
          pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(e => {});
        } else {
          pendingCandidates.push(msg.candidate);
        }
      } else if (msg.type === 'peer_left' && msg.clientId === publisherId) {
        vid.srcObject = null;
      }
    };
    ws.onclose = () => setTimeout(connect, 3000);
  }

  function handleOffer(msg) {
    if (pc) pc.close();
    pc = new RTCPeerConnection(rtcConfig);
    pendingCandidates = [];

    // PAKSA: Pesan jalur untuk audio dan video
    pc.addTransceiver('audio', { direction: 'recvonly' });
    pc.addTransceiver('video', { direction: 'recvonly' });

    pc.ontrack = (e) => {
      // LOGIKA SAKTI: Gunakan satu MediaStream yang sama selamanya
      if (!vid.srcObject) {
        vid.srcObject = new MediaStream();
      }
      
      const stream = vid.srcObject;
      
      // Hapus track lama dengan jenis yang sama agar tidak menumpuk
      stream.getTracks().forEach(t => {
        if (t.kind === e.track.kind) {
          stream.removeTrack(t);
        }
      });
      
      // Tambahkan track baru (video baru atau audio yang tetap)
      pc.getReceivers().forEach(receiver => {
        if (receiver.playoutDelayHint !== undefined) receiver.playoutDelayHint = 0;
        if (receiver.jitterBufferDelayHint !== undefined) receiver.jitterBufferDelayHint = 0;
      });
      stream.addTrack(e.track);
      
      vid.volume = 1.0; 
      vid.play().catch(e => {
        console.log("Autoplay blocked by browser");
        vid.muted = true;
        vid.play();
        document.getElementById('unmuteOverlay').style.display = 'flex';
      });
      
      try {
        vid.latencyMode = 'realtime'; // Standar W3C
        vid.latencyHint = 0; // Fallback
      } catch(err) {}
    };

    // Handler Klik untuk Unmute
    document.getElementById('unmuteOverlay').onclick = () => {
      vid.muted = false;
      vid.play();
      document.getElementById('unmuteOverlay').style.display = 'none';
    };

    pc.onicecandidate = (e) => {
      if (e.candidate && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'candidate', roomId, candidate: e.candidate,
          senderId: clientId, targetId: publisherId
        }));
      }
    };

    // ICE failure handler - recovery otomatis saat koneksi gagal
    pc.oniceconnectionstatechange = () => {
      const s = pc.iceConnectionState;
      console.log('[OBS ICE]', s);
      if (s === 'failed') {
        console.log('[OBS] ICE failed, reconnecting...');
        if (pc) { try { pc.close(); } catch(e) {} pc = null; }
        // Tunggu offer baru dari publisher
      } else if (s === 'disconnected') {
        setTimeout(() => {
          if (pc && pc.iceConnectionState === 'disconnected') {
            console.log('[OBS] ICE still disconnected, closing...');
            if (pc) { try { pc.close(); } catch(e) {} pc = null; }
          }
        }, 5000);
      }
    };

    pc.setRemoteDescription(new RTCSessionDescription(msg))
      .then(() => {
        pendingCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)).catch(e => {}));
        pendingCandidates = [];
        return pc.createAnswer({
          offerToReceiveAudio: true,
          offerToReceiveVideo: true
        });
      })
      .then(answer => pc.setLocalDescription(answer))
      .then(() => {
        ws.send(JSON.stringify({
          type: 'answer', roomId, sdp: pc.localDescription.sdp,
          senderId: clientId, targetId: publisherId
        }));
      });
  }

  connect();
})();
</script>
</body>
</html>
