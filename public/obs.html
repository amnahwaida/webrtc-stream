<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Stream v7</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  video { width: 100vw; height: 100vh; object-fit: contain; background: #000; cursor: pointer; }
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<!-- Overlay unmute -->
<div id="unmuteOverlay" style="position:fixed;inset:0;z-index:15;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);cursor:pointer">
  <div style="text-align:center;color:#fff;padding:24px 40px;border-radius:16px;background:rgba(108,92,231,0.8)">
    <span style="font-size:48px">🔇</span>
    <p style="margin-top:8px;font-size:16px;font-weight:600">Klik untuk aktifkan suara</p>
  </div>
</div>
<!-- Version indicator -->
<div style="position:fixed;bottom:4px;right:4px;font-size:9px;color:rgba(255,255,255,0.3);z-index:5">v7</div>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  const roomId = params.get('room') || 'cam1';
  const clientId = 'obs_' + Math.random().toString(36).substr(2, 8);
  const vid = document.getElementById('video');
  const overlay = document.getElementById('unmuteOverlay');

  const stunHost = location.hostname;
  const rtcConfig = {
    iceServers: [
      { urls: `stun:${stunHost}:3478` },
      { urls: `turn:${stunHost}:3478`, username: 'webrtc', credential: 'webrtc123' }
    ],
    iceTransportPolicy: 'all',
    bundlePolicy: 'max-bundle',
    rtcpMuxPolicy: 'require'
  };

  let ws, pc, publisherId;
  let pendingCandidates = [];

  // ── Unmute: klik di mana saja ──
  function doUnmute() {
    vid.muted = false;
    overlay.style.display = 'none';
  }
  overlay.onclick = doUnmute;
  vid.onclick = doUnmute;
  document.body.onclick = function() { if (vid.muted) doUnmute(); };

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const token = params.get('token') || '';
    const wsUrl = `${proto}//${location.host}/ws${token ? '?token=' + token : ''}`;

    try { if (ws) ws.close(); } catch(e) {}
    if (pc) { try { pc.close(); } catch(e) {} pc = null; }

    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'join', roomId, clientId, role: 'viewer' }));
    };

    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);

      if (msg.type === 'joined') {
        const pub = (msg.peers || []).find(p => p.role === 'publisher');
        if (pub) publisherId = pub.clientId;
      }

      if (msg.type === 'peer_joined' && msg.role === 'publisher') {
        publisherId = msg.clientId;
      }

      if (msg.type === 'peer_left' && msg.clientId === publisherId) {
        publisherId = null;
        vid.srcObject = null;
      }

      if (msg.type === 'offer') {
        publisherId = msg.senderId;
        handleOffer(msg);
      }

      if (msg.type === 'candidate' && pc) {
        if (pc.remoteDescription) {
          pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(() => {});
        } else {
          pendingCandidates.push(msg.candidate);
        }
      }
    };

    ws.onclose = () => setTimeout(connect, 3000);
    ws.onerror = () => {};
  }

  function handleOffer(msg) {
    if (pc) { try { pc.close(); } catch(e) {} }
    pendingCandidates = [];

    pc = new RTCPeerConnection(rtcConfig);

    pc.ontrack = (e) => {
      vid.srcObject = e.streams[0] || new MediaStream([e.track]);
      // Tampilkan overlay unmute saat stream mulai
      if (vid.muted) {
        overlay.style.display = 'flex';
      }
      // Optimasi Latensi
      if (e.receiver) {
        try {
          e.receiver.playoutDelayHint = 0;
          e.receiver.jitterBufferTarget = 0;
        } catch(err) {}
      }
    };

    pc.onicecandidate = (e) => {
      if (e.candidate && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'candidate', roomId, candidate: e.candidate,
          senderId: clientId, targetId: publisherId
        }));
      }
    };

    pc.oniceconnectionstatechange = () => {
      if (pc && pc.iceConnectionState === 'failed') {
        vid.srcObject = null;
      }
    };

    pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: msg.sdp }))
      .then(() => {
        pendingCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {}));
        pendingCandidates = [];
        return pc.createAnswer();
      })
      .then(answer => pc.setLocalDescription(answer))
      .then(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'answer', roomId, sdp: pc.localDescription.sdp,
            senderId: clientId, targetId: publisherId
          }));
        }
      })
      .catch(e => console.error('Offer handling error:', e));
  }

  connect();
})();
</script>
</body>
</html>
