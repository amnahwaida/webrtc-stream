services:
  signaling:
    build:
      context: .
      dockerfile: signaling/Dockerfile
    container_name: webrtc-signaling
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=${PORT:-3000}
      - HTTP_PORT=${HTTP_PORT:-3080}
      - ROOM_TOKEN=${ROOM_TOKEN:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - MAX_VIEWERS=${MAX_VIEWERS:-5}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RECORD_DIR=/data/records
    volumes:
      - records:/data/records
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # Local STUN/TURN server for fully offline LAN
  coturn:
    image: coturn/coturn:alpine
    container_name: webrtc-coturn
    restart: unless-stopped
    network_mode: host
    command:
      - --listening-port=3478
      - --min-port=49152
      - --max-port=49200
      - --no-tls
      - --no-dtls
      - --no-auth
      - --no-cli
      - --fingerprint
      - --lt-cred-mech
      - --user=webrtc:webrtc123
      - --realm=lan
      - --log-file=stdout
      - --simple-log
      - --no-multicast-peers
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  records:
